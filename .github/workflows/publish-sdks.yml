name: Publish Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_packages:
        description: "Publish @arma packages to npm"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish-packages:
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_packages == 'true' }}
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.26

      - name: Setup Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Clean workspace completely  
        run: |
          echo "Cleaning workspace..."
          rm -rf node_modules 2>/dev/null || true
          rm -rf bun.lockb 2>/dev/null || true
          find packages/arma -name "node_modules" -type d -exec rm -rf {} + 2>/dev/null || true
          find packages/arma -name "dist" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "Workspace cleaned completely"

      - name: Install dependencies (with retry)
        run: |
          echo "Installing dependencies..."
          bun install || (echo "First install failed, cleaning and retrying..." && rm -rf node_modules && bun install)

      - name: Build all packages
        run: bun run build

      - name: Run tests (skip for now)
        run: echo "Skipping tests for initial publish"

      - name: Publish @arma/connector
        working-directory: packages/arma/connector
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @arma/sdk
        working-directory: packages/arma/sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @arma/jupiter
        working-directory: packages/arma/jupiter
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @arma/providers
        working-directory: packages/arma/providers
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/') && always() && !cancelled()
    needs: [publish-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Arma Packages Published

            ### @arma/connector
            - Package: `@arma/connector`
            - Version: ${{ github.ref_name }}
            - Registry: npm

            ### @arma/sdk
            - Package: `@arma/sdk`
            - Version: ${{ github.ref_name }}
            - Registry: npm

            ### @arma/jupiter
            - Package: `@arma/jupiter`
            - Version: ${{ github.ref_name }}
            - Registry: npm

            ### @arma/providers
            - Package: `@arma/providers`
            - Version: ${{ github.ref_name }}
            - Registry: npm

            ## Installation

            **Install the main SDK:**
            ```bash
            npm install @arma/sdk@${{ github.ref_name }}
            ```

            **Install the connector (if using headless):**
            ```bash
            npm install @arma/connector@${{ github.ref_name }}
            ```

            **Install Jupiter integration:**
            ```bash
            npm install @arma/jupiter@${{ github.ref_name }}
            ```

            **Install providers:**
            ```bash
            npm install @arma/providers@${{ github.ref_name }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

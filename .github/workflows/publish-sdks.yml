name: Publish Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_packages:
        description: "Publish @arma packages to npm"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish-packages:
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_packages == 'true' }}
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Clean workspace completely
        run: |
          echo "Cleaning workspace..."
          rm -rf node_modules 2>/dev/null || true
          rm -rf package-lock.json 2>/dev/null || true
          find packages/arma -name "node_modules" -type d -exec rm -rf {} + 2>/dev/null || true
          find packages/arma -name "dist" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "Workspace cleaned"

      - name: Install dependencies with npm
        run: |
          echo "Installing dependencies with npm..."
          npm install

      - name: Build all packages
        run: npm run build

      - name: Run tests (skip for now)
        run: echo "Skipping tests for initial publish"

      - name: Publish @armadura/connector
        working-directory: packages/arma/connector
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @armadura/sdk
        working-directory: packages/arma/sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @armadura/jupiter
        working-directory: packages/arma/jupiter
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @armadura/providers
        working-directory: packages/arma/providers
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/') && always() && !cancelled()
    needs: [publish-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Arma Packages Published

            ### @armadura/connector
            - Package: `@armadura/connector`
            - Version: ${{ github.ref_name }}
            - Registry: npm

            ### @armadura/sdk
            - Package: `@armadura/sdk`
            - Version: ${{ github.ref_name }}
            - Registry: npm

            ### @armadura/jupiter
            - Package: `@armadura/jupiter`
            - Version: ${{ github.ref_name }}
            - Registry: npm

            ### @armadura/providers
            - Package: `@armadura/providers`
            - Version: ${{ github.ref_name }}
            - Registry: npm

            ## Installation

            **Install the main SDK:**
            ```bash
            npm install @armadura/sdk@${{ github.ref_name }}
            ```

            **Install the connector (if using headless):**
            ```bash
            npm install @armadura/connector@${{ github.ref_name }}
            ```

            **Install Jupiter integration:**
            ```bash
            npm install @armadura/jupiter@${{ github.ref_name }}
            ```

            **Install providers:**
            ```bash
            npm install @armadura/providers@${{ github.ref_name }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

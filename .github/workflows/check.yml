name: Check
on:
  push:
    paths:
      - '**'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-latest-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-latest-
      - name: Cache Turbo artifacts
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-2.8.1-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-2.8.1-
      - name: Install dependencies
        run: bun install
      - name: 🔦 Lint + typecheck (affected only)
        run: ./node_modules/.bin/turbo run lint typecheck --affected
      - name: 🔎 Repo policy lint
        run: bun run lint:repo